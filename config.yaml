server: # 服务器元数据
  name: YA_MCPServer_Knowledge_graph_Generator
  name_zh: YA MCP 知识图谱生成器
  author: YA Project
  description: A mcp server which extracts content and generate knowledge graph.
  description_zh: 内容抽取生成知识图谱的MCP 。
  version: 0.1.0

transport: # 服务器启动方式配置
  type: "stdio" # 可选值: stdio, sse
  host: "127.0.0.1" # 仅在 type 为 sse 时有效，表示监听地址，默认为 0.0.0.0
  port: 12345 # 仅在 type 为 sse 时有效，表示监听端口，默认为 12345

logging: # 日志配置
  console:
    enabled: true
    level: "DEBUG"
  file:
    enabled: true
    level: "DEBUG"
    path: "logs/%Y-%m-%d_%H-%M-%S.log"
    rotation: "10 MB"
    retention: "7 days"
    compression: "zip"

kg: # 知识图谱抽取与裁剪配置
  top_k_entities: 80
  min_occur: 2
  min_len: 2
  max_len: 10
  entity_blacklist:
    - "介绍"
    - "概述"
    - "总结"
    - "总洁"
    - "例子"
    - "示例"
    - "例如"
    - "因此"
  min_edge_weight: 2
  centrality_metric: "pagerank" # pagerank | degree | betweenness
  top_n_core: null
  adaptive_top_n: true
  keep_seed_entities: true
  seed_from_title: true
